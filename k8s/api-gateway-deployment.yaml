apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: incident-env
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: incident-env:latest
          env:
            - name: DEPLOYMENT_MODE
              value: distributed
            - name: SERVICE_NAME
              value: api-gateway
            - name: REDIS_URL
              value: redis://redis:6379
          resources:
            limits:
              memory: "256Mi"
              cpu: "250m"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: incident-env
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
