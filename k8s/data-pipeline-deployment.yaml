apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-pipeline
  namespace: incident-env
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-pipeline
  template:
    metadata:
      labels:
        app: data-pipeline
    spec:
      containers:
        - name: data-pipeline
          image: incident-env:latest
          env:
            - name: DEPLOYMENT_MODE
              value: distributed
            - name: SERVICE_NAME
              value: data-pipeline
            - name: DATABASE_URL
              value: postgresql://incident:$(POSTGRES_PASSWORD)@postgres:5432/incident_env
            - name: REDIS_URL
              value: redis://redis:6379
          resources:
            limits:
              memory: "1Gi"
              cpu: "500m"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: data-pipeline
  namespace: incident-env
spec:
  selector:
    app: data-pipeline
  ports:
    - port: 8000
